<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>寻找你的天赋</title>

    <link rel="stylesheet" href="css/style.css">
</head>

<body>

<div class="test-page">

    <!-- 顶部 -->
    <header class="top">

        <h1>寻找你的天赋</h1>

        <div class="progress">

           <span id="current">
1/24
</span>
        </div>

    </header>

    <!-- 中间内容 -->
    <main class="question-box">


        <h2 id="question">

            如果今天拥有完整的一天，你更愿意？

        </h2>

        <div class="options">

            <div class="option">
                阅读一本喜欢的书
            </div>

            <div class="option">
                去陌生地方探索
            </div>

            <div class="option">
                与朋友交流
            </div>

            <div class="option">
                完成一直想做的事情
            </div>

        </div>

    </main>

    <!-- 底部 -->
    <footer class="bottom">

        <button class="prev">

            ← 上一题

        </button>

        <button class="next">

            下一题 →

        </button>

    </footer>

</div>

<script src="js/questions.js"></script>

<script src="js/app.js"></script>

</body>

</html>
